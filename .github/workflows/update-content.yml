name: Atualizar Conteúdo YouTube

on:
  schedule:
    - cron: '0 11 * * *'   # Todo dia às 08:00 BRT (11:00 UTC)
  workflow_dispatch:         # Permite rodar manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Atualizar conteúdo via YouTube API
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/update_content.py

      - name: Commit e push se houver mudanças
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Nenhuma mudança detectada."
          else
            git commit -m "chore: atualiza stats e vídeos [bot]"
            git push
          fi
